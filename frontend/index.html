<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JINJI</title>
  <link rel="icon" href="assets/favicon/favicon.ico">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/code.css">
  <link rel="stylesheet" href="css/atom-one-dark.css">
</head>
<body>
  <div id="main-container">
    <div id="sidebar">
      <img src="assets/images/jinjitext.png" id="textlogo">
      <img src="assets/images/logo.png" id="logo">
      <div id="model-selector-container">
        <label>Choose Model:</label>
        <select id="model-selector">
          <option>Loading...</option>
        </select>
      </div>
      <div id="context-length-container"><br>
          <label for="context-length-slider">
              <strong>Context Length:</strong> <span id="context-length-label">16384</span>
          </label>
          <input type="range"
                 id="context-length-slider"
                 min="4096"
                 max="28672"
                 step="4096"
                 value="16384">
      </div>
      <div id="model-details" class="model-details">
          <p><strong>Architecture:</strong><br><span id="architecture"></span></p>
          <p><strong>Parameters:</strong><br><span id="parameters"></span></p>
          <p><strong>Max Context Length:</strong><br><span id="context-length"></span></p>
          <p><strong>Embedding Length:</strong><br><span id="embedding-length"></span></p>
          <p><strong>Quantization:</strong><br><span id="quantization"></span></p>
      </div>
    </div>
    <div id="chat-container">
      <div id="chat-box"></div>
      <div id="chat-controls">
        <label class="context-button">
            <input type="checkbox" id="context-toggle">
            <span></span>
            Include Context
        </label>
      </div>
      <div id="input-container">
        <textarea id="input" placeholder="Type a message..."></textarea>
        <div id="button-column">
          <button id="send-button">Send</button>
          <button id="stop-button" disabled>Stop</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/vendor/highlight.min.js"></script>
  <script src="js/vendor/purify.min.js"></script>
  <script src="js/vendor/marked.min.js"></script>
  <script type="module" src="js/init.js"></script>
</body>
</html>
