<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JINJI</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/resources/github.min.css">
  <script src="assets/resources/marked.min.js"></script>
  <script src="assets/resources/highlight.min.js"></script>
</head>

<body>
  <div id="main-container">
    <div id="sidebar">
      <img src="assets/images/logo.png" alt="Jinji Logo" id="logo">
      <div id="model-selector-container">
        <label for="model-selector">Choose Model:</label>
        <select id="model-selector">
          <option value="">Loading models...</option>
        </select>
      </div>
    </div>

    <div id="chat-container">
      <div id="chat-box"></div>
      <div id="input-container">
        <textarea id="input" placeholder="Type a message..."></textarea>
        <div id="button-column">
          <button id="send-button">Send</button>
          <button id="stop-button" disabled>Stop</button>
        </div>
      </div>
    </div>
  </div>

  <script src="chat.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      hljs.highlightAll();
    });
  </script>
</body>

</html>
